title: PowerShell Encoded Command Execution
id: 59374092-2345-4819-8123-abcdef123456
status: test
description: Detects execution of PowerShell with encoded commands used for obfuscation and evasion.
logsource:
  category: process_creation
  product: windows
detection:
  selection:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains:
      - ' -enc '
      - ' -EncodedCommand '
      - ' -ec '
  condition: selection
falsepositives:
  - Legitimate administrative scripts with base64 encoded payloads
level: high
tags:
  - attack.t1027.010
  - attack.t1059.001
  - attack.execution
