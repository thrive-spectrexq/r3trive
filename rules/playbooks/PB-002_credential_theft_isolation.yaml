id: PB-002
name: Credential Theft Mitigation
description: Terminate LSASS dump processes and isolate host if credential dumping is detected
trigger:
  incident_type: credential_access
  risk_score_gte: 75
  severity_gte: high
steps:
  - name: Kill credential dumper
    action: kill_process
    params:
      pid: "$.incident.primary_pid"
    on_failure: abort

  - name: Block C2 IP
    action: block_ip
    params:
      ip: "$.incident.primary_ip"
    on_failure: continue
