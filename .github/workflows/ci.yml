name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        go-version: ['1.25.x']

    steps:
    - name: Checkout code
      uses: actions/checkout@v7

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: ${{ matrix.go-version }}
        cache: true

    - name: Install dependencies
      run: go mod download

    - name: Install libyara-dev (Ubuntu)
      if: runner.os == 'Linux'
      run: sudo apt-get update && sudo apt-get install -y libyara-dev

    - name: Build
      env:
        CGO_ENABLED: ${{ matrix.os == 'windows-latest' && '0' || '1' }}
      run: go build -v ./...

    - name: Test
      env:
        CGO_ENABLED: ${{ matrix.os == 'windows-latest' && '0' || '1' }}
      shell: bash
      run: |
        if [ "$RUNNER_OS" == "Windows" ]; then
          go test -v ./...
        else
          go test -v -race ./...
        fi

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v7
    - uses: actions/setup-go@v6
      with:
        go-version: '1.25.x'
        cache: true
    - name: Install libyara-dev
      run: sudo apt-get update && sudo apt-get install -y libyara-dev pkg-config
    - name: Install golangci-lint
      run: curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/master/install.sh | sh -s -- -b $(go env GOPATH)/bin latest
    - name: Run golangci-lint
      env:
        CGO_ENABLED: "1"
      run: $(go env GOPATH)/bin/golangci-lint run --timeout=5m
